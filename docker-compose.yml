services:
  game-server-manager:
    image: ghcr.io/mbrown22073/sgsm:latest
    container_name: game-server-manager
    ports:
      - "8080:80"
    volumes:
      - ./gsm_data:/app/data        # SQLite DB, uploads, config (bind mount — visible on host)
      - gsm_steamcmd:/opt/steamcmd  # SteamCMD binaries & cache
      - ./gsm_servers:/opt/servers  # Installed game servers (bind mount — visible on host)
    environment:
      - DATA_DIR=/app/data
    restart: unless-stopped

  # ── Optional: local MySQL (uncomment to use) ──────────────────────────────
