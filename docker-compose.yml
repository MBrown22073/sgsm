services:
  # Registers x86_64 (amd64) emulation via QEMU binfmt — runs once then exits.
  # Required on ARM64 hosts (e.g. Synology NAS) to run x86_64 game server binaries.
  # On amd64 hosts this is a no-op and completes instantly.
  binfmt:
    image: tonistiigi/binfmt:latest
    command: --install amd64
    privileged: true
    restart: "no"

  game-server-manager:
    image: ghcr.io/deadmojosites/sgsm:latest
    container_name: game-server-manager
    depends_on:
      binfmt:
        condition: service_completed_successfully
    ports:
      - "8880:8080"                    # Web UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket — panel manages game containers
      - ./gsm_data:/app/data            # SQLite DB, logs, uploads
      - ./gsm_servers:/opt/servers      # Game server files (shared with game containers)
    environment:
      - DATA_DIR=/app/data
      - DOCKER_SOCKET=/var/run/docker.sock
      - GSM_SERVERS_HOST_PATH=${GSM_SERVERS_HOST_PATH:-/opt/servers}  # Set in .env: GSM_SERVERS_HOST_PATH=/volume1/docker/SGSM/gsm_servers
      - APP_KEY=${APP_KEY:-changeme-please-set-a-32-char-secret}  # Used to encrypt steam passwords
    restart: unless-stopped

  # ── Optional: local MySQL (uncomment to use) ──────────────────────────────
  # mysql:
